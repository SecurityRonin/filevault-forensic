name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - run: cargo test --workspace --all-features

  oracle:
    name: Tier-1 oracle (real decrypt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      # Fetch the public Apache-2.0 dfvfs CoreStorage/FileVault2 image and carve
      # its CS partition (GPT LBA 40) so the Tier-1 test genuinely decrypts real
      # data in CI instead of skipping. See docs/validation.md.
      - name: Fetch + carve the dfvfs fvdetest oracle
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-utils
          curl -sL https://raw.githubusercontent.com/log2timeline/dfvfs/main/test_data/fvdetest.qcow2 -o fvdetest.qcow2
          qemu-img convert -O raw fvdetest.qcow2 fvdetest.raw
          dd if=fvdetest.raw of=cs.raw bs=512 skip=40 count=1048496
          echo "FVDE_ORACLE_IMAGE=$PWD/cs.raw" >> "$GITHUB_ENV"
      - name: Run the Tier-1 oracle tests
        # --all-features so the `vfs` EncryptionLayer adapter's real-decrypt test
        # (core/src/vfs.rs) runs against the oracle too, not just the readers.
        run: cargo test --workspace --all-features --test oracle_fvde --test oracle --lib

  msrv:
    name: MSRV (1.81)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.81
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - run: cargo build --workspace --all-features

  coverage:
    name: Coverage (100% lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-llvm-cov
      # Provide the Tier-1 oracle so coverage also exercises the full real-data
      # decrypt path and the reader-based analyzer entry points (the hermetic
      # synthetic tests already cover their lines; this adds real-data reach).
      - name: Fetch + carve the dfvfs fvdetest oracle
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-utils
          curl -sL https://raw.githubusercontent.com/log2timeline/dfvfs/main/test_data/fvdetest.qcow2 -o fvdetest.qcow2
          qemu-img convert -O raw fvdetest.qcow2 fvdetest.raw
          dd if=fvdetest.raw of=cs.raw bs=512 skip=40 count=1048496
          echo "FVDE_ORACLE_IMAGE=$PWD/cs.raw" >> "$GITHUB_ENV"
      # Each executable source line must be hit at least once.
      #
      # Exception — panic-free defence in depth: a line carrying a
      # `// cov:unreachable` marker is unreachable under a dominating invariant,
      # kept deliberately to stay panic-free if that invariant is ever broken by
      # a future change. Such lines cannot be exercised by any test and are
      # exempt. The gate fails on any OTHER zero-hit line.
      - name: Generate lcov
        # --all-features so the `vfs` EncryptionLayer adapter (core/src/vfs.rs) is
        # compiled and measured; the oracle above lets its real-decrypt test run.
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - name: Enforce line coverage (unreachable defensive arms must carry // cov:unreachable)
        shell: bash
        run: |
          fail=0
          while IFS= read -r line; do
            if [[ "$line" == SF:* ]]; then
              f="${line#SF:}"
            elif [[ "$line" =~ ^DA:([0-9]+),0$ ]]; then
              n="${BASH_REMATCH[1]}"
              src="$(sed -n "${n}p" "$f")"
              if [[ "$src" == *cov:unreachable* ]]; then
                echo "exempt (// cov:unreachable): $f:$n"
              else
                echo "::error::Uncovered line $f:$n:$src"
                fail=1
              fi
            fi
          done < lcov.info
          if [[ "$fail" -ne 0 ]]; then exit 1; fi
          echo "All executable lines covered, or annotated // cov:unreachable."

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check

  vet:
    name: Cargo Vet (supply-chain)
    runs-on: ubuntu-latest
    # Complements `deny` (known-bad advisories/licenses) with the supply-chain-
    # injection layer: every dependency version must be human-source-reviewed or
    # covered by an imported aggregate audit set (Google/Mozilla/Bytecode-Alliance/
    # Embark). Config in supply-chain/{config,audits,imports}.toml.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-vet
        uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-vet
      - name: Fetch dependencies
        run: cargo fetch
      - name: Check supply chain
        run: cargo vet --locked

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --workspace --all-features
